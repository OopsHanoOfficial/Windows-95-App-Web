<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Windows Media Player Fullscreen</title>
    <style>
        :root {
            --win-gray: #c0c0c0;
            --win-dark: #808080;
            --win-light: #ffffff;
            --win-blue: #000080;
        }

        * { box-sizing: border-box; font-family: 'MS Sans Serif', Tahoma, sans-serif; touch-action: manipulation; }
        
        body { 
            margin: 0; padding: 0; background: var(--win-gray); 
            height: 100vh; width: 100vw; display: flex; flex-direction: column; 
            overflow: hidden;
        }

        /* THANH TIÊU ĐỀ */
        #title-bar {
            background: var(--win-blue);
            color: white;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            height: 35px;
        }

        /* KHU VỰC HIỂN THỊ CHÍNH - CHIẾM HẦU HẾT MÀN HÌNH */
        #display-area {
            flex-grow: 1;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid var(--win-dark);
            position: relative;
            overflow: hidden;
        }

        video, #img-display { 
            max-width: 100%; 
            max-height: 100%; 
            display: none; 
        }

        #audio-visual {
            color: #00ff00;
            text-align: center;
            display: none;
        }

        .music-icon { font-size: 80px; margin-bottom: 10px; }

        /* BẢNG ĐIỀU KHIỂN DƯỚI CÙNG */
        #controls-panel {
            background: var(--win-gray);
            padding: 10px;
            height: auto;
            border-top: 2px solid var(--win-light);
        }

        #file-info {
            font-size: 12px;
            background: #eee;
            border: 2px inset var(--win-light);
            padding: 5px;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        input[type="range"] {
            width: 100%;
            height: 15px;
            cursor: pointer;
            margin: 10px 0;
        }

        .btn-group {
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 10px;
        }

        button {
            flex: 1;
            height: 45px;
            font-weight: bold;
            border: 2px solid;
            border-color: var(--win-light) var(--win-dark) var(--win-dark) var(--win-light);
            background: var(--win-gray);
            cursor: pointer;
        }

        button:active {
            border-color: var(--win-dark) var(--win-light) var(--win-light) var(--win-dark);
            background: #d0d0d0;
        }

        #file-selector-btn {
            background: #008080;
            color: white;
            padding: 10px;
            text-align: center;
            border: 2px outset var(--win-light);
            margin-bottom: 10px;
            display: block;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="title-bar">
    <span>Windows Media Player Pro</span>
    <span>📁</span>
</div>

<div id="display-area">
    <video id="main-media"></video>
    
    <img id="img-display" alt="Preview">
    
    <div id="audio-visual">
        <div class="music-icon">🎵</div>
        <div id="audio-name" style="font-weight: bold;">Đang sẵn sàng...</div>
    </div>
</div>

<div id="controls-panel">
    <label id="file-selector-btn" for="file-input">📂 CHỌN FILE (MP3, MP4, ẢNH)</label>
    <input type="file" id="file-input" accept="audio/*,video/*,image/*" style="display: none;">

    <div id="file-info" id="filename-display">Chưa có tệp nào được chọn</div>
    
    <input type="range" id="seek-bar" value="0" step="0.1">
    
    <div class="btn-group">
        <button onclick="togglePlay()" id="play-btn">▶ PHÁT</button>
        <button onclick="pauseMedia()">■ DỪNG</button>
        <div style="display: flex; align-items: center; gap: 5px;">
            📢 <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="1" style="width: 60px;">
        </div>
    </div>
</div>

<script>
    const media = document.getElementById('main-media');
    const imgDisplay = document.getElementById('img-display');
    const audioVisual = document.getElementById('audio-visual');
    const fileInput = document.getElementById('file-input');
    const fileInfo = document.getElementById('file-info');
    const playBtn = document.getElementById('play-btn');
    const seekBar = document.getElementById('seek-bar');
    const volumeSlider = document.getElementById('volume-slider');

    fileInput.onchange = function() {
        const file = this.files[0];
        if (!file) return;

        const url = URL.createObjectURL(file);
        fileInfo.innerText = "Tệp: " + file.name;
        
        // Ẩn tất cả trước khi hiển thị loại mới
        media.style.display = 'none';
        imgDisplay.style.display = 'none';
        audioVisual.style.display = 'none';
        media.pause();

        if (file.type.startsWith('image/')) {
            // Hiển thị ẢNH
            imgDisplay.src = url;
            imgDisplay.style.display = 'block';
            seekBar.style.visibility = 'hidden';
        } else if (file.type.startsWith('audio/')) {
            // Hiển thị NHẠC
            media.src = url;
            media.style.display = 'none';
            audioVisual.style.display = 'block';
            document.getElementById('audio-name').innerText = file.name;
            seekBar.style.visibility = 'visible';
            media.play();
            playBtn.innerText = "⏸ TẠM DỪNG";
        } else if (file.type.startsWith('video/')) {
            // Hiển thị VIDEO
            media.src = url;
            media.style.display = 'block';
            seekBar.style.visibility = 'visible';
            media.play();
            playBtn.innerText = "⏸ TẠM DỪNG";
        }
    };

    function togglePlay() {
        if (media.paused) {
            media.play();
            playBtn.innerText = "⏸ TẠM DỪNG";
        } else {
            media.pause();
            playBtn.innerText = "▶ PHÁT";
        }
    }

    function pauseMedia() {
        media.pause();
        playBtn.innerText = "▶ PHÁT";
        // Không reset currentTime để dừng đúng chỗ như An yêu cầu
    }

    media.ontimeupdate = function() {
        if (media.duration) {
            seekBar.value = (media.currentTime / media.duration) * 100;
        }
    };

    seekBar.oninput = function() {
        if (media.duration) {
            media.currentTime = (seekBar.value / 100) * media.duration;
        }
    };

    volumeSlider.oninput = function() {
        media.volume = volumeSlider.value;
    };

    media.onended = function() {
        playBtn.innerText = "▶ PHÁT";
    };
</script>

</body>
</html>
